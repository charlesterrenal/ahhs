# Docker Compose Template for Homelab
# Replace all ${VARIABLES} with your actual values

version: '3.8'

services:
# NGINX PROXY MANAGER - Reverse Proxy (Public)
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: npm
    restart: unless-stopped
    ports:
      # These should remain on 0.0.0.0 (public)
      - '80:80'       # HTTP
      - '81:81'       # Admin UI
      - '443:443'     # HTTPS
    volumes:
      - ./npm_data:/data
      - ./letsencrypt:/etc/letsencrypt
    environment:
      - TZ=${TIMEZONE}

# LOCALSTACK - AWS Emulator (LAN/Private)
  localstack:
    image: localstack/localstack-pro
    container_name: localstack-main
    restart: unless-stopped
    ports:
      # Bind to LAN IP or localhost
      - "${SERVER_IP}:4566:4566"              # Main endpoint
      - "${SERVER_IP}:4510-4559:4510-4559"    # Service port range
      - "${SERVER_IP}:4443:443"               # HTTPS endpoint
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - DEBUG=${DEBUG:-0}
      - PERSISTENCE=${PERSISTENCE:-1}
      - LOCALSTACK_HOST=${LOCALSTACK_DOMAIN}
      - SERVER_URL=https://${LOCALSTACK_DOMAIN}
      - EXTRA_CORS_ALLOWED_ORIGINS=https://app.localstack.cloud,https://${LOCALSTACK_DOMAIN}
      - TZ=${TIMEZONE}
    volumes:
      - ./localstack_volume:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

# N8N - Workflow Automation (LAN/Behind Proxy)
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${SERVER_IP}:5678:5678"
    environment:
      - N8N_HOST=${N8N_DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_DOMAIN}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - TZ=${TIMEZONE}
    volumes:
      - ./n8n_data:/home/node/.n8n

# VAULTWARDEN - Password Manager (LAN/Behind Proxy)
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "${SERVER_IP}:8081:80"
    environment:
      - DOMAIN=https://${VAULTWARDEN_DOMAIN}
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED:-false}
      - INVITATIONS_ALLOWED=${INVITATIONS_ALLOWED:-true}
      - WEBSOCKET_ENABLED=true
      - TZ=${TIMEZONE}
    volumes:
      - ./vaultwarden_data:/data

# JELLYFIN - Media Server (LAN/Behind Proxy)
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "${SERVER_IP}:8096:8096"           # HTTP web interface
      - "${SERVER_IP}:8920:8920"           # HTTPS web interface
      - "${SERVER_IP}:7359:7359/udp"       # Client discovery
      - "${SERVER_IP}:1900:1900/udp"       # DLNA discovery
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ./jellyfin_config:/config
      - ./jellyfin_cache:/cache
      # Media directories - adjust paths to your media location
      - ${MEDIA_PATH_ANIME}:/anime
      - ${MEDIA_PATH_MOVIES}:/movies
      - ${MEDIA_PATH_SERIES}:/series
    network_mode: bridge

# HOMEPAGE - Dashboard (LAN Only)
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "${SERVER_IP}:3000:3000"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TIMEZONE}
    volumes:
      - ./homepage_config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # PORTAINER - Docker Management (LAN Only)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "${SERVER_IP}:9000:9000"
      - "${SERVER_IP}:9443:9443"
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./portainer_data:/data

# CLOUDFLARE TUNNEL - Secure Tunnel (No ports needed)
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    environment:
      - TZ=${TIMEZONE}

